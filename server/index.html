<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Android Dashboard</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f9f9f9;
    margin: 0;
    padding: 1rem;
  }
  .hidden { display: none; }
  .container {
    max-width: 500px;
    margin: auto;
    background: #fff;
    padding: 1rem;
    box-shadow: 0 0 10px #ccc;
    border-radius: 8px;
  }
  h1 {
    text-align: center;
  }
  /* Firmware upload */
  .toggle-group {
    display: flex;
    justify-content: center;
    margin-bottom: 1rem;
  }
  .toggle-group label {
    flex: 1;
    text-align: center;
    padding: 0.5rem;
    cursor: pointer;
    user-select: none;
  }
  .toggle-group input[type="radio"] {
    display: none;
  }
  .toggle-group input[type="radio"]:checked + label {
    background-color: #444;
    color: white;
    font-weight: bold;
  }
  .upload-area {
    border: 2px dashed #ccc;
    border-radius: 6px;
    text-align: center;
    padding: 2rem 1rem;
    color: #666;
    cursor: pointer;
    margin-bottom: 1rem;
    transition: background 0.3s;
    display:flex;
    flex-direction:column;
  }
  .upload-area.dragover {
    background: #eef;
    border-color: #44a;
  }
  input[type="file"] {
    display: none;
  }

  /* Command input */
  .command-section {
    margin-bottom: 1rem;
  }
  .command-section input[type="text"] {
    width: 70%;
    padding: 0.5rem;
    font-size: 1rem;
    border: 1px solid #ccc;
    border-radius: 4px;
  }
  .command-section button {
    padding: 0.5rem 1rem;
    margin-left: 0.5rem;
    font-weight: bold;
    border: none;
    background-color: #444;
    color: white;
    border-radius: 4px;
    cursor: pointer;
  }
  .command-section button:hover {
    background-color: #222;
  }

  /* Data Log */
  .log-section {
    background: #121212;
    color: #0f0;
    font-family: monospace;
    height: 150px;
    overflow-y: auto;
    padding: 0.5rem;
    border-radius: 6px;
    white-space: pre-wrap;
  }

  /* Restart button */
  .restart-btn {
    width: 100%;
    padding: 1rem;
    background-color: #444;
    color: white;
    font-weight: bold;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 1rem;
  }
  .restart-btn:hover {
    background-color: #222;
  }

  /* Android-only message */
  .android-only-message {
    text-align: center;
    margin-top: 2rem;
    font-size: 1.2rem;
    color: red;
  }
</style>
</head>
<body>

<div id="android-dashboard" class="container hidden">
  <h1>SafeBoot Firmware Update</h1>
  <p style="text-align:center; color:gray; font-size:0.9rem;">
    Upload a firmware/file system image here or use Over-the-Air (OTA) update in PlatformIO with Arduino OTA on port 3232.
  </p>

  <!-- Firmware/File System toggle -->
  <div class="toggle-group">
    <input type="radio" id="firmware" name="uploadType" value="firmware" checked />
    <label for="firmware">Firmware <a href="#" style="color:white; text-decoration:underline;">(backup)</a></label>

    <input type="radio" id="filesystem" name="uploadType" value="filesystem" />
    <label for="filesystem">File System <a href="#" style="color:black; text-decoration:underline;">(backup)</a></label>
  </div>

  <!-- Upload area -->
  <label class="upload-area" for="fileinput" id="upload-area">
    <div style="font-size: 1rem;">&#8682;</div>
    Drag and drop here<br />
    <small>or click to select (.bin) file</small>
    <input type="file" id="fileinput" accept=".bin" />
  </label>

  <hr />

  <div style="font-family:monospace">
    <strong>Chip:</strong> <span id="chip-info" style="font-size:12px">ESP32-D0WD-V3 (4 MB)</span><br />
    <strong>SafeBoot-Version:</strong> <span id="version-info" style="font-size:12px">main_fe0df40_modified</span>
  </div>

  <button class="restart-btn" id="restart-btn">Restart</button>

  <hr />

  <!-- Command input -->
  <div style="display:flex" class="command-section">
    <input type="text" id="cmd-input" placeholder="Enter command..." />
    <button onclick="sendCommand()">Send</button>
  </div>

  <!-- Data log display -->
  <h2 style="font-family:monospace"><strong>Logs Data:</strong></h2>
  <div class="log-section" id="data-log">
      
  </div>
</div>

<div id="not-android" class="android-only-message">
  This dashboard is accessible on Android devices only.
</div>

<script>
  // Android detection
  function isAndroid() {
    return /Android/i.test(navigator.userAgent);
  }

  const dashboard = document.getElementById('android-dashboard');
  const notAndroid = document.getElementById('not-android');

  if (isAndroid()) {
    dashboard.classList.remove('hidden');
    notAndroid.classList.add('hidden');
  } else {
    dashboard.classList.add('hidden');
    notAndroid.classList.remove('hidden');
  }

  // Upload area drag and drop
  const uploadArea = document.getElementById('upload-area');
  const fileInput = document.getElementById('fileinput');
  const dataLog = document.getElementById('data-log');

  uploadArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadArea.classList.add('dragover');
  });

  uploadArea.addEventListener('dragleave', (e) => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
  });

  uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    handleFile(e.dataTransfer.files);
  });

  fileInput.addEventListener('change', () => {
    handleFile(fileInput.files);
  });

  function handleFile(files) {
    if (!files.length) return;
    const file = files[0];
    if (!file.name.endsWith('.bin')) {
      logData('Error: Please select a .bin file.');
      return;
    }
    logData('Selected file: ' + file.name + ' (' + (file.size/1024).toFixed(2) + ' KB)');
    // TODO: Implement upload process here
  }

  // Command submission
  function sendCommand() {
    const cmdInput = document.getElementById('cmd-input');
    const cmd = cmdInput.value.trim();
    if (!cmd) return;
    logData('> ' + cmd);
    cmdInput.value = '';

    // TODO: Implement sending command to device or backend. Simulate response:
    setTimeout(() => {
      logData('Response: Command "' + cmd + '" executed.');
    }, 500);
  }

  // Log helper
  function logData(message) {
    const now = new Date().toLocaleTimeString();
    dataLog.textContent += `[${now}] ${message}\n`;
    dataLog.scrollTop = dataLog.scrollHeight;
  }

  // Restart button
  document.getElementById('restart-btn').addEventListener('click', () => {
    logData('Restarting device...');
    // TODO: Implement actual restart method via API or command
  });
</script>

</body>
</html>
